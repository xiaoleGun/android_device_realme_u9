##This file needs to be pushed into /vendor/etc/libese-tms.conf

###############################################################################
# Application options
SE_DEBUG_ENABLED=1
# DEBUG_LEVEL_ definition
# DEBUG_LEVEL_NONE 0x00
# DEBUG_LEVEL_E 0x01
# DEBUG_LEVEL_W 0x02
# DEBUG_LEVEL_D 0x03
TMS_SE_HAL_LOGLEVEL=3

# SPI Device Node name
TMS_ESE_DEV_NODE="/dev/tms_ese"
# I2C Device Node name
TMS_NFC_DEV_NODE="/dev/tms_nfc"

TMS_FW_NAME="THN31_FW_VTP.txt"
TMS_NFC_BL_NAME="THN31_NFCC_BL_VTP.txt"
TMS_ESE_COS_NAME="THN31_ESE_VTP.txt"

#FW DL check FW version or not
#0, do not check FW version, the same fw can be DL
#1, check FW version, only new fw version can be DL
FW_DL_CHK_VER=1

# Limit FW/BL/CosPatch downloads or not
# 0, do not limit FW/BL/CosPatch downloads
# 1, limit FW/BL/CosPatch downloads
TMS_NFCC_ERASURE_PROTECTION=1

###############################################################################
# Oem who will use specify ESE property:
# QCOM   = 0
# MTK    = 1
# UNISOC = 2
# CUSTOM = 3
ESE_PROP_PLAT_TYPE=0

###############################################################################
# VEN Toggle Config
# Disable = 0x00
# Enable  = 0x01
# for debug only, disable the feature to prevent performing hard reset
ENABLE_VEN_TOGGLE=0x01

###############################################################################
# Device ID define in qsee_spi_device_id_t
# default is QSEE_SPI_DEVICE_15
QTEE_ESE_PROP_SPI_DEVICE_ID=0x01

###############################################################################
# SPI max frequency
# default is 500000
QTEE_ESE_PROP_SPI_MAX_FREQ=5000000

###############################################################################
# In the idle state whether the SPI clk is high or low.
# QSEE_SPI_CLK_IDLE_LOW = 0
# QSEE_SPI_CLK_IDLE_HIGH = 1
QTEE_ESE_PROP_SPI_CLK_POLARITY=0

###############################################################################
# Shift mode(CPHA), detemines which signal (input or output) is sampled first.
# QSEE_SPI_INPUT_FIRST_MODE = 0
# QSEE_SPI_OUTPUT_FIRST_MODE = 1
QTEE_ESE_PROP_SPI_SHIFT_MODE=0

###############################################################################
# In idle state whether the Chip Select is high or low.
# QSEE_SPI_CS_ACTIVE_LOW = 0
# QSEE_SPI_CS_ACTIVE_HIGH = 1
QTEE_ESE_PROP_SPI_CS_POLARITY=0

###############################################################################
# List of values that inidicates, whether the Chip select is always active or if
# it's brought back to its idle state after N clock cycles.
# QSEE_SPI_CS_DEASSERT = 0
# QSEE_SPI_CS_KEEP_ASSERTED = 1
QTEE_ESE_PROP_SPI_CS_MODE=1
###############################################################################
# SPI Clock is always on or turned off after every transaction, this enum is deprecated.
# The driver ignores the value passed.
# QSEE_SPI_CLK_NORMAL = 0
# QSEE_SPI_CLK_ALWAYS_ON = 1
QTEE_ESE_PROP_SPI_CLK_ALWAYS_ON=0

###############################################################################
QTEE_ESE_PROP_SPI_BITS_PER_WORD=8


###############################################################################
#COS patch tags
#The following configs support 020000, 020100, 020200 and 020300 versions
COS_PATCH_TAG_HEADER_LIST="PATCH_020000_VER_BEGIN,PATCH_020100_VER_BEGIN,PATCH_020200_VER_BEGIN,PATCH_020300_VER_BEGIN,
                           PATCH_020000_VER_END,PATCH_020100_VER_END,PATCH_020200_VER_END,PATCH_020300_VER_END,
                           PATCH_020000_BEGIN,PATCH_020100_BEGIN,PATCH_020200_BEGIN,PATCH_020300_BEGIN,
                           PATCH_020000_END,PATCH_020100_END,PATCH_020200_END,PATCH_020300_END"

###############################################################################
#FW tags
#The following configs support EC1 test/release, EC2 test/release versions
FW_TAG_HEADER_LIST="T_EC1_VER_BEGIN,T_EC1_VER_END,R_EC1_VER_BEGIN,R_EC1_VER_END,
                    T_EC2_VER_BEGIN,T_EC2_VER_END,R_EC2_VER_BEGIN,R_EC2_VER_END,
                    T_THN31F2G_VER_BEGIN,T_THN31F2G_VER_END,R_THN31F2G_VER_BEGIN,R_THN31F2G_VER_END,
                    T_THN31P_VER_BEGIN,T_THN31P_VER_END,R_THN31P_VER_BEGIN,R_THN31P_VER_END,
                    T_EC1_BEGIN,T_EC1_END,R_EC1_BEGIN,R_EC1_END,
                    T_EC2_BEGIN,T_EC2_END,R_EC2_BEGIN,R_EC2_END,
                    T_THN31F2G_BEGIN,T_THN31F2G_END,R_THN31F2G_BEGIN,R_THN31F2G_END,
                    T_THN31P_BEGIN,T_THN31P_END,R_THN31P_BEGIN,R_THN31P_END"

#<chipType:chipKeyType:cmdTypeVerBgn/cmdTypeVerEnd>
#CHIP_EC1 is 0x10
#CHIP_EC2 is 0x20
#CHIP_T_KEY is 0x00
#CHIP_R_KEY is 0x80
#<CHIP_EC1(0x10):CHIP_T_KEY(0x00):T_EC1_VER_BEGIN/T_EC1_VER_END>
#<CHIP_EC1(0x10):CHIP_R_KEY(0x80):R_EC1_VER_BEGIN/R_EC1_VER_END>
#<CHIP_EC2(0x20):CHIP_T_KEY(0x00):T_EC2_VER_BEGIN/T_EC2_VER_END>
#<CHIP_EC2(0x20):CHIP_R_KEY(0x80):R_EC2_VER_BEGIN/R_EC2_VER_END>
#<CHIP_THN31F2G(0x30):CHIP_T_KEY(0x00):T_THN31F2G_VER_BEGIN/T_THN31F2G_VER_END>
#<CHIP_THN31F2G(0x30):CHIP_R_KEY(0x80):R_THN31F2G_VER_BEGIN/R_THN31F2G_VER_END>
#<CHIP_THN31P(0x40):CHIP_T_KEY(0x00):T_THN31P_VER_BEGIN/T_THN31P_VER_END>
#<CHIP_THN31P(0x40):CHIP_R_KEY(0x80):R_THN31P_VER_BEGIN/R_THN31P_VER_END>
FW_VER_TAG_HEADER_MAP="0x10:0x00:T_EC1_VER_BEGIN/T_EC1_VER_END,
                       0x10:0x80:R_EC1_VER_BEGIN/R_EC1_VER_END,
                       0x20:0x00:T_EC2_VER_BEGIN/T_EC2_VER_END,
                       0x20:0x80:R_EC2_VER_BEGIN/R_EC2_VER_END,
                       0x30:0x00:T_THN31F2G_VER_BEGIN/T_THN31F2G_VER_END,
                       0x30:0x80:R_THN31F2G_VER_BEGIN/R_THN31F2G_VER_END,
                       0x40:0x00:T_THN31P_VER_BEGIN/T_THN31P_VER_END,
                       0x40:0x80:R_THN31P_VER_BEGIN/R_THN31P_VER_END"

#<chipType:chipKeyType:cmdTypeBgn/cmdTypeEnd>
#CHIP_EC1 is 0x10
#CHIP_EC2 is 0x20
#CHIP_T_KEY is 0x00
#CHIP_R_KEY is 0x80
#<CHIP_EC1(0x10):CHIP_T_KEY(0x00):T_EC1_BEGIN/T_EC1_END>
#<CHIP_EC1(0x10):CHIP_R_KEY(0x80):R_EC1_BEGIN/R_EC1_END>
#<CHIP_EC2(0x20):CHIP_T_KEY(0x00):T_EC2_BEGIN/T_EC2_END>
#<CHIP_EC2(0x20):CHIP_R_KEY(0x80):R_EC2_BEGIN/R_EC2_END>
#<CHIP_THN31F2G(0x30):CHIP_T_KEY(0x00):T_THN31F2G_BEGIN/T_THN31F2G_END>
#<CHIP_THN31F2G(0x30):CHIP_R_KEY(0x80):R_THN31F2G_BEGIN/R_THN31F2G_END>
#<CHIP_THN31P(0x40):CHIP_T_KEY(0x00):T_THN31P_BEGIN/T_THN31P_END>
#<CHIP_THN31P(0x40):CHIP_R_KEY(0x80):R_THN31P_BEGIN/R_THN31P_END>
FW_TAG_HEADER_MAP="0x10:0x00:T_EC1_BEGIN/T_EC1_END,
                   0x10:0x80:R_EC1_BEGIN/R_EC1_END,
                   0x20:0x00:T_EC2_BEGIN/T_EC2_END,
                   0x20:0x80:R_EC2_BEGIN/R_EC2_END,
                   0x30:0x00:T_THN31F2G_BEGIN/T_THN31F2G_END,
                   0x30:0x80:R_THN31F2G_BEGIN/R_THN31F2G_END,
                   0x40:0x00:T_THN31P_BEGIN/T_THN31P_END,
                   0x40:0x80:R_THN31P_BEGIN/R_THN31P_END"

#<cosMasterVer:cmdTypeVerBgn/cmdTypeVerEnd>
#COS_VER_MASTER_020000 is 0x020000
#COS_VER_MASTER_020100 is 0x020100
#COS_VER_MASTER_020200 is 0x020200
#COS_VER_MASTER_020300 is 0x020300
#<COS_VER_MASTER_020000(0x020000):PATCH_020000_VER_BEGIN/PATCH_020000_VER_END>
#<COS_VER_MASTER_020100(0x020100):PATCH_020100_VER_BEGIN/PATCH_020100_VER_END>
#<COS_VER_MASTER_020200(0x020200):PATCH_020200_VER_BEGIN/PATCH_020200_VER_END>
#<COS_VER_MASTER_020300(0x020300):PATCH_020300_VER_BEGIN/PATCH_020300_VER_END>
COS_PATCH_VER_TAG_HEADER_MAP="0x020000:PATCH_020000_VER_BEGIN/PATCH_020000_VER_END,
                              0x020100:PATCH_020100_VER_BEGIN/PATCH_020100_VER_END,
                              0x020200:PATCH_020200_VER_BEGIN/PATCH_020200_VER_END,
                              0x020300:PATCH_020300_VER_BEGIN/PATCH_020300_VER_END"

#<cosMasterVer:cmdTypeBgn/cmdTypeEnd>
#COS_VER_MASTER_020000 is 0x020000
#COS_VER_MASTER_020100 is 0x020100
#COS_VER_MASTER_020200 is 0x020200
#COS_VER_MASTER_020300 is 0x020300
#<COS_VER_MASTER_020000(0x020000):PATCH_020000_BEGIN/PATCH_020000_END>
#<COS_VER_MASTER_020100(0x020100):PATCH_020100_BEGIN/PATCH_020100_END>
#<COS_VER_MASTER_020200(0x020200):PATCH_020200_BEGIN/PATCH_020200_END>
#<COS_VER_MASTER_020300(0x020300):PATCH_020300_BEGIN/PATCH_020300_END>
COS_PATCH_TAG_HEADER_MAP="0x020000:PATCH_020000_BEGIN/PATCH_020000_END,
                          0x020100:PATCH_020100_BEGIN/PATCH_020100_END,
                          0x020200:PATCH_020200_BEGIN/PATCH_020200_END,
                          0x020300:PATCH_020300_BEGIN/PATCH_020300_END"

COS_MASTER_VER_LIST="0x020000,0x020100,0x020200,0x020300"

